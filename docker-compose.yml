services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ze
      POSTGRES_PASSWORD: ze
      POSTGRES_DB: ze
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ze"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/ze-api/Dockerfile
    env_file: apps/ze-api/.env
    environment:
      DATABASE_URL: postgresql://ze:ze@postgres:5432/ze
      DATABASE_URL_SYNC: postgresql+psycopg2://ze:ze@postgres:5432/ze
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
